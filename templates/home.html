<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
    <style>
        body {
            margin: 0;
            background: #F5EFE7;
            font-family: system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #3b3b3b;
        }

        .card {
            background: #FFFFFF;
            padding: 32px 28px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            width: 360px;
        }

        .emoji {
            font-size: 42px;
            margin-bottom: 12px;
            text-align: center;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin: 18px 0 8px;
        }

        p {
            margin: 0 0 8px;
            font-size: 14px;
            color: #666;
        }

        form {
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #d2c9bc;
            background: #faf6f0;
            outline: none;
            font-size: 14px;
            margin-bottom: 10px;
        }

        input:focus {
            border-color: #7A8450;
            box-shadow: 0 0 0 2px rgba(122,132,80,0.18);
        }

        button {
            width: 100%;
            padding: 10px;
            background: #7A8450;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.92;
        }

        .divider {
            margin: 16px 0;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

<div class="card">
    {% if message %}
    <div style="
        background:#FFE5E5;
        color:#B33A3A;
        padding:10px 14px;
        border-radius:10px;
        margin-bottom:16px;
        font-size:14px;
        text-align:center;">
        {{ message }}
    </div>
    {% endif %}

    <div class="emoji"></div>
    <h1>Welcome to Food Tracker</h1>

    <div class="section-title">New here? Register</div>
    <p>Create an account to start tracking your food.</p>
    <form method="POST" action="/register">
        <input type="text" name="name" placeholder="Your name" required>
        <input type="password" name="password" placeholder="Choose a password" required>
        <button type="submit">Register</button>
    </form>

    <div class="divider">or</div>

    <div class="section-title">Already have an account? Login</div>
    <form method="POST" action="/login">
        <input type="text" name="name" placeholder="Your name" required>
        <input type="password" name="password" placeholder="Your password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
